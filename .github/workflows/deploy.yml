name: Build and Deploy Deelish Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: deelishacr.azurecr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: deelishacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.DEELISHACR }}

      # ── Build and push all images ──────────────────────────────────────────

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/gateway.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/auth.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/auth-service:latest

      - name: Build and push media-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/media.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/media-service:latest

      - name: Build and push social-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/social.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/social-service:latest

      - name: Build and push ai-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/ai.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/ai-service:latest

      - name: Build and push search-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/search.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/search-service:latest

      - name: Build and push analytics-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/analytics.Dockerfile
          push: true
          tags: deelishacr.azurecr.io/deelish/analytics-service:latest

      # ── Deploy to Azure App Service ────────────────────────────────────────

      - name: Deploy gateway
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-gateway
          publish-profile: ${{ secrets.PUBLISH_PROFILE_GATEWAY }}
          images: deelishacr.azurecr.io/deelish/gateway:latest

      - name: Deploy auth-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-auth
          publish-profile: ${{ secrets.PUBLISH_PROFILE_AUTH }}
          images: deelishacr.azurecr.io/deelish/auth-service:latest

      - name: Deploy media-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-media
          publish-profile: ${{ secrets.PUBLISH_PROFILE_MEDIA }}
          images: deelishacr.azurecr.io/deelish/media-service:latest

      - name: Deploy social-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-social
          publish-profile: ${{ secrets.PUBLISH_PROFILE_SOCIAL }}
          images: deelishacr.azurecr.io/deelish/social-service:latest

      - name: Deploy ai-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-ai
          publish-profile: ${{ secrets.PUBLISH_PROFILE_AI }}
          images: deelishacr.azurecr.io/deelish/ai-service:latest

      - name: Deploy search-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-search
          publish-profile: ${{ secrets.PUBLISH_PROFILE_SEARCH }}
          images: deelishacr.azurecr.io/deelish/search-service:latest

      - name: Deploy analytics-service
        uses: azure/webapps-deploy@v3
        with:
          app-name: deelish-analytics
          publish-profile: ${{ secrets.PUBLISH_PROFILE_ANALYTICS }}
          images: deelishacr.azurecr.io/deelish/analytics-service:latest