apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: deelish/ai-service:latest
          imagePullPolicy: Never  
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: USE_MOCK_AI
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - port: 3004
      targetPort: 3004