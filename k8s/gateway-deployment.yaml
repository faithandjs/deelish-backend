apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: deelish/gateway:latest
          imagePullPolicy: Never  
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: FRONTEND_URL
              value: http://localhost:5173
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: MEDIA_SERVICE_URL
              value: http://media-service:3002
            - name: SOCIAL_SERVICE_URL
              value: http://social-service:3003
            - name: AI_SERVICE_URL
              value: http://ai-service:3004
            - name: SEARCH_SERVICE_URL
              value: http://search-service:3005
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:3006
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort          # NodePort = accessible from outside the cluster
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000     # hit localhost:30000 from your browser to reach the gateway