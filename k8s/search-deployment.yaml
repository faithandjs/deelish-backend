apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: deelish/search-service:latest
          imagePullPolicy: Never  
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: DB_PATH
              value: /data/search.db
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
          volumeMounts:
            - name: search-data
              mountPath: /data
      volumes:
        - name: search-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
spec:
  selector:
    app: search-service
  ports:
    - port: 3005
      targetPort: 3005